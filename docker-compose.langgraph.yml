services:
  tools-service:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: zhijian-tools
    environment:
      TOOLS_JWT_SECRET: ${ZHIJIAN_JWT_SECRET:?missing ZHIJIAN_JWT_SECRET}
      TOOLS_MYSQL_HOST: ${LANGGRAPH_MYSQL_HOST:-127.0.0.1}
      TOOLS_MYSQL_PORT: ${LANGGRAPH_MYSQL_PORT:-3306}
      TOOLS_MYSQL_USER: ${LANGGRAPH_MYSQL_USER:?missing LANGGRAPH_MYSQL_USER}
      TOOLS_MYSQL_PASSWORD: ${LANGGRAPH_MYSQL_PASSWORD:?missing LANGGRAPH_MYSQL_PASSWORD}
      TOOLS_MYSQL_DB: ${LANGGRAPH_MYSQL_DB:?missing LANGGRAPH_MYSQL_DB}
      TOOLS_BACKEND_BASE_URL: ${LANGGRAPH_BACKEND_BASE_URL:-http://127.0.0.1:8080/api}
    restart: unless-stopped
    network_mode: host

  langgraph:
    build:
      context: .
      dockerfile: Dockerfile.langgraph
    container_name: zhijian-langgraph
    environment:
      AGENT_JWT_SECRET: ${ZHIJIAN_JWT_SECRET:?missing ZHIJIAN_JWT_SECRET}
      AGENT_TOOLS_BASE_URL: ${LANGGRAPH_TOOLS_BASE_URL:-http://127.0.0.1:18080}
      AGENT_REDIS_HOST: ${LANGGRAPH_REDIS_HOST:-127.0.0.1}
      AGENT_REDIS_PORT: ${LANGGRAPH_REDIS_PORT:-6379}
      AGENT_REDIS_DB: ${LANGGRAPH_REDIS_DB:-0}
      AGENT_REDIS_PASSWORD: ${LANGGRAPH_REDIS_PASSWORD:-}
    restart: unless-stopped
    network_mode: host
