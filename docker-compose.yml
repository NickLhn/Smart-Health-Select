version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: zhijian-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: zhijian_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: zhijian-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhijian-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/zhijian_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped

  # AI 服务 - Tools
  ai-tools:
    build:
      context: ./zhijian_langgraph
      dockerfile: Dockerfile.tools
    container_name: zhijian-ai-tools
    ports:
      - "18080:18080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

  # AI 服务 - Agent
  ai-agent:
    build:
      context: ./zhijian_langgraph
      dockerfile: Dockerfile.agent
    container_name: zhijian-ai-agent
    ports:
      - "18081:18081"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LANGGRAPH_AGENT_BASE_URL=http://ai-agent:18081
    depends_on:
      - ai-tools
    restart: unless-stopped

  # Nginx 前端统一入口
  nginx:
    image: nginx:alpine
    container_name: zhijian-nginx
    ports:
      - "80:80"
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
