services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: zhijian-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?missing MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhijian_db}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: zhijian-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhijian-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-zhijian_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?missing SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      ZHIJIAN_JWT_SECRET: ${ZHIJIAN_JWT_SECRET:?missing ZHIJIAN_JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME:-}
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID:-}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-}
      ALIYUN_OCR_ENDPOINT: ${ALIYUN_OCR_ENDPOINT:-ocr-api.cn-hangzhou.aliyuncs.com}
      ALIYUN_OCR_ACCESS_KEY_ID: ${ALIYUN_OCR_ACCESS_KEY_ID:-}
      ALIYUN_OCR_ACCESS_KEY_SECRET: ${ALIYUN_OCR_ACCESS_KEY_SECRET:-}
      ALIYUN_OCR_CONFIDENCE_THRESHOLD: ${ALIYUN_OCR_CONFIDENCE_THRESHOLD:-0.8}
      LANGGRAPH_AGENT_BASE_URL: ${LANGGRAPH_AGENT_BASE_URL:-http://ai-agent:18081}
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped

  # AI 服务 - Tools
  ai-tools:
    build:
      context: ./zhijian_langgraph
      dockerfile: Dockerfile.tools
    container_name: zhijian-ai-tools
    ports:
      - "18080:18080"
    environment:
      TOOLS_JWT_SECRET: ${ZHIJIAN_JWT_SECRET:?missing ZHIJIAN_JWT_SECRET}
      TOOLS_MYSQL_HOST: ${LANGGRAPH_MYSQL_HOST:-mysql}
      TOOLS_MYSQL_PORT: ${LANGGRAPH_MYSQL_PORT:-3306}
      TOOLS_MYSQL_USER: ${LANGGRAPH_MYSQL_USER:-root}
      TOOLS_MYSQL_PASSWORD: ${LANGGRAPH_MYSQL_PASSWORD:?missing LANGGRAPH_MYSQL_PASSWORD}
      TOOLS_MYSQL_DB: ${LANGGRAPH_MYSQL_DB:-zhijian_db}
      TOOLS_BACKEND_BASE_URL: ${LANGGRAPH_BACKEND_BASE_URL:-http://backend:8080/api}
    restart: unless-stopped

  # AI 服务 - Agent
  ai-agent:
    build:
      context: ./zhijian_langgraph
      dockerfile: Dockerfile.agent
    container_name: zhijian-ai-agent
    ports:
      - "18081:18081"
    environment:
      AGENT_JWT_SECRET: ${ZHIJIAN_JWT_SECRET:?missing ZHIJIAN_JWT_SECRET}
      AGENT_TOOLS_BASE_URL: ${LANGGRAPH_TOOLS_BASE_URL:-http://ai-tools:18080}
      AGENT_REDIS_HOST: ${LANGGRAPH_REDIS_HOST:-redis}
      AGENT_REDIS_PORT: ${LANGGRAPH_REDIS_PORT:-6379}
      AGENT_REDIS_DB: ${LANGGRAPH_REDIS_DB:-0}
      AGENT_REDIS_PASSWORD: ${LANGGRAPH_REDIS_PASSWORD:-}
    depends_on:
      - ai-tools
    restart: unless-stopped

  # Nginx 前端统一入口
  nginx:
    image: nginx:alpine
    container_name: zhijian-nginx
    ports:
      - "80:80"
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
