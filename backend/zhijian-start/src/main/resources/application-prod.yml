    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:LTAI5tGnTGWVBnWNYacoCEAZ}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:GIXZ2JHxaYxzQJeaByZoFfgblFN1wd}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:liuhaonan-java-ai}
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:LTAI5tSTd2GqJr5arV97zEyP}
