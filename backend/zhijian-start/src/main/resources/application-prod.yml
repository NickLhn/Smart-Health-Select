server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境数据库连接，默认连接本机 MySQL
    url: jdbc:mysql://localhost:3306/zhijian_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: zhijian_db
    # 请将在宝塔面板-数据库-root密码 中查看到的密码填在这里
    password: ${DB_PASSWORD:Lhnan0122..}
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # 如果在宝塔 Redis 设置了密码，请填在这里；如果没有，留空即可
      password: ${REDIS_PASSWORD:}

# 生产环境日志级别
logging:
  level:
    root: INFO
    com.zhijian: INFO

knife4j:
  production: false # 生产环境是否开启文档，建议关闭

zhijian:
  ai:
    coze:
      api-token: ${COZE_API_TOKEN:}
      bot-id: ${COZE_BOT_ID:}
      merchant-bot-id: ${COZE_MERCHANT_BOT_ID:}
    openai:
      # 生产环境 API Key
      api-key: ${OPENAI_API_KEY:sk-a56903ddc505472a8a2c615250254bdc}
      base-url: https://api.deepseek.com
    langgraph:
      agent-base-url: ${LANGGRAPH_AGENT_BASE_URL:http://127.0.0.1:18081}

# Aliyun Config
