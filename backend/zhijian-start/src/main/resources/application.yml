server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  application:
    name: zhijian-backend
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhijian_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j API Docs
knife4j:
  enable: true
  setting:
    language: zh-CN

zhijian:
  ai:
    coze:
      api-token: ${COZE_API_TOKEN:}
      bot-id: ${COZE_BOT_ID:}
      merchant-bot-id: ${COZE_MERCHANT_BOT_ID:}
    openai:
      # 生产环境 API Key
      api-key: ${OPENAI_API_KEY:sk-a56903ddc505472a8a2c615250254bdc}
      base-url: https://api.deepseek.com
    langgraph:
      agent-base-url: ${LANGGRAPH_AGENT_BASE_URL:http://127.0.0.1:18081}

# Aliyun Config
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:LTAI5tGnTGWVBnWNYacoCEAZ}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:GIXZ2JHxaYxzQJeaByZoFfgblFN1wd}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:liuhaonan-java-ai}
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:LTAI5tSTd2GqJr5arV97zEyP}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:KiuDxERbeH2XFxp6igTKsMZe0SJ99c}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:速通互联验证平台}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:100001}
  ocr:
    endpoint: ${ALIYUN_OCR_ENDPOINT:ocr-api.cn-hangzhou.aliyuncs.com}
    access-key-id: ${ALIYUN_OCR_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OCR_ACCESS_KEY_SECRET:}
    confidence-threshold: ${ALIYUN_OCR_CONFIDENCE_THRESHOLD:0.8}
