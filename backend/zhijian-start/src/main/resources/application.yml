server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: zhijian-backend
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhijian_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j API Docs
knife4j:
  enable: true
  setting:
    language: zh-CN

zhijian:
  ai:
    coze:
      api-token: ${COZE_API_TOKEN:sat_QgCl82pNnvtYPDHHTeBW2o5m0ZGqQmzjlyM7cDtIhV9CeT2bUZsK5Sq9GaFwlLqr}
      bot-id: 7592221151066325035
    openai:
      api-key: ${OPENAI_API_KEY:sk-a56903ddc505472a8a2c615250254bdc}
      base-url: https://api.deepseek.com
      
# Aliyun OSS Config
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:your_access_key_id}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:your_access_key_secret}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:liuhaonan-java-ai}
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:your_access_key_id}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:your_access_key_secret}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:阿里云短信测试}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:SMS_329195922}

